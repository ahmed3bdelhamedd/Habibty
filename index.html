<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أغلى ما في حياتي.. أنا آسف ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose-deep: #b5173a;
            --rose-mid: #e63262;
            --rose-soft: #ff7096;
            --rose-pale: #ffd6e0;
            --rose-blush: #fff0f3;
            --gold: #d4a847;
            --cream: #fffaf4;
            --dark-text: #3b0a18;
            --mid-text: #7a2232;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--cream);
            font-family: 'Tajawal', sans-serif;
            color: var(--dark-text);
            overflow-x: hidden;
        }

        /* ===== LOCK SCREEN ===== */
        #lockScreen {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 60% 40%, #ffd6e0 0%, #ffb3c6 40%, #e63262 100%);
        }

        .lock-petals {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .petal {
            position: absolute;
            font-size: 1.4rem;
            animation: petalFall linear infinite;
            opacity: 0.5;
        }

        @keyframes petalFall {
            0%  { transform: translateY(-5vh) rotate(0deg); opacity: 0.6; }
            100%{ transform: translateY(110vh) rotate(400deg); opacity: 0; }
        }

        .lock-box {
            position: relative;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(182, 23, 58, 0.25), 0 0 0 1px rgba(255,255,255,0.6) inset;
            text-align: center;
            max-width: 420px;
            width: 92%;
        }

        .lock-icon {
            font-size: 3.5rem;
            margin-bottom: 18px;
            display: block;
        }

        .lock-box h2 {
            font-family: 'Amiri', serif;
            font-size: 1.7rem;
            color: var(--rose-deep);
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .lock-box p {
            color: var(--mid-text);
            font-size: 1.05rem;
            margin-bottom: 28px;
            line-height: 1.7;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 18px;
        }

        .lock-box input {
            width: 100%;
            padding: 14px 22px;
            border: 2px solid var(--rose-pale);
            border-radius: 50px;
            font-size: 1.15rem;
            font-family: 'Tajawal', sans-serif;
            text-align: center;
            outline: none;
            background: var(--rose-blush);
            color: var(--dark-text);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .lock-box input:focus {
            border-color: var(--rose-mid);
            box-shadow: 0 0 0 4px rgba(230,50,98,0.12);
        }

        .unlock-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--rose-mid), var(--rose-deep));
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.15rem;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(182,23,58,0.3);
        }

        #errorMessage {
            color: var(--rose-deep);
            margin-top: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            display: none;
        }

        /* ===== HEARTS RAIN ===== */
        .heart {
            position: fixed;
            top: -8vh;
            pointer-events: none;
            z-index: 500;
            animation: heartFall linear forwards;
        }

        @keyframes heartFall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 24px 40px;
            background: var(--cream);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--rose-pale), var(--rose-mid), var(--gold), var(--rose-mid), var(--rose-pale));
        }

        .eyebrow {
            font-size: 0.9rem;
            letter-spacing: 4px;
            color: var(--rose-soft);
            font-weight: 700;
            margin-bottom: 22px;
        }

        .hero-title {
            font-family: 'Amiri', serif;
            font-size: clamp(2rem, 5vw, 3.4rem);
            color: var(--rose-deep);
            line-height: 1.4;
            max-width: 800px;
            margin-bottom: 30px;
            text-align: center;
        }

        .hero-body {
            font-size: 1.2rem;
            line-height: 2;
            max-width: 680px;
            color: var(--mid-text);
            text-align: center;
            margin-bottom: 40px;
        }

        /* ===== COUNTDOWN TIMER ===== */
        .timer-section {
            background: white;
            padding: 24px 35px;
            border-radius: 25px;
            box-shadow: 0 10px 35px rgba(182,23,58,0.06);
            border: 1px solid var(--rose-pale);
            text-align: center;
            max-width: 550px;
            width: 100%;
            margin-bottom: 30px;
        }

        .timer-title {
            font-size: 1.05rem;
            color: var(--rose-deep);
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .timer-block {
            background: var(--rose-blush);
            padding: 12px 8px;
            border-radius: 15px;
            border: 1px solid rgba(230,50,98,0.1);
        }

        .timer-num {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--rose-mid);
            display: block;
            line-height: 1.2;
        }

        .timer-label {
            font-size: 0.8rem;
            color: var(--mid-text);
            font-weight: 400;
        }

        .scroll-hint {
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--rose-soft);
            letter-spacing: 2px;
            animation: bobbing 2s ease-in-out infinite;
        }

        @keyframes bobbing {
            0%,100%{ transform: translateY(0); }
            50%    { transform: translateY(6px); }
        }

        /* ===== GALLERY ===== */
        .gallery-section {
            padding: 60px 20px 80px;
            background: linear-gradient(180deg, var(--cream) 0%, var(--rose-blush) 100%);
        }

        .section-title {
            font-family: 'Amiri', serif;
            text-align: center;
            font-size: 2rem;
            color: var(--rose-deep);
            margin-bottom: 50px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 28px;
            max-width: 1280px;
            margin: 0 auto;
        }

        .photo-card {
            background: white;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 6px 24px rgba(182,23,58,0.08);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out, box-shadow 0.3s;
        }

        .photo-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .photo-card:hover {
            box-shadow: 0 18px 45px rgba(182,23,58,0.18);
            transform: translateY(-5px);
        }

        .img-container {
            width: 100%;
            height: 340px;
            background: #ffeef2;
            position: relative;
            overflow: hidden;
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity 0.3s ease-in;
        }

        .photo-card img.loaded {
            opacity: 1;
        }

        .card-body {
            padding: 18px 20px;
            border-top: 2px solid var(--rose-pale);
        }

        .card-num {
            font-size: 0.75rem;
