<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إلى صفية ❤️</title>
    <style>
        body { background-color: #fff0f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #d81b60; animation: bounce 2s infinite; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 280px; transition: transform 0.3s; }
        .card:hover { transform: scale(1.05); }
        img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; }
        .caption { margin-top: 10px; color: #555; font-weight: bold; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <h1>رسالة حب لصفية ❤️</h1>
    <p>كل صورة هنا بتحكي ذكرى حلوة بيننا...</p>

    <div class="gallery" id="gallery"></div>

    <script>
        const captions = [
            "أول لقاء لنا.. كان أجمل صدفة", "ضحكتك أجمل شيء في يومي", "معاكِ كل وقتي بيحلو", "عيونك فيها أمان العالم",
            "ذكريات لا تنسى", "أحب تفاصيلك الصغيرة", "أنتِ النور في حياتي", "كل يوم بحبك أكتر", "أحلى أيام عمري معاكِ",
            "أنتِ قلبي وروحي", "ضحكتك بتدوب قلبي", "وجودك جنبي كفاية", "مكانك في قلبي محجوز", "أحلى صدفة في حياتي",
            "حياتي من غيرك مالهاش معنى", "أنتِ فرحة أيامي", "ما بتخيل يومي من غيرك", "بحب طريقتك في الكلام",
            "أنتِ كل أحلامي", "يا أغلى من روحي", "أنتِ الأمل اللي بشوفه", "أجمل هدية من القدر", "أحلى صورة ليكي",
            "نظرة عينيكِ بتسحرني", "أنتِ اللي بكمل معاكِ", "يا أجمل ما في حياتي", "أحبك حب ما له حدود",
            "أنتِ عالمي كله", "باقي عمري لكِ يا صفية"
        ];

        // ضع رابط الـ Repository الخاص بك هنا بدلاً من الرابط الوهمي بالأسفل
        const baseUrl = "https://raw.githubusercontent.com/USER_NAME/REPO_NAME/main/"; 
        const gallery = document.getElementById('gallery');

        for (let i = 1; i <= 29; i++) {
            let num = i.toString().padStart(2, '0');
            let card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<img src="${baseUrl}${num}.jpeg"><div class="caption">${captions[i-1]}</div>`;
            gallery.appendChild(card);
        }
    </script>
</body>
</html>
